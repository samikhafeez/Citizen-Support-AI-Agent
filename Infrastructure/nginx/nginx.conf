# ─────────────────────────────────────────────────────────────────────────────
# nginx.conf  —  TLS reverse proxy for Bradford Council chatbot
#
# Listens on:
#   :80   HTTP → redirects to https://YOUR_EC2_IP
#   :8080 HTTP → redirects to https://YOUR_EC2_IP  (no :8080 in final URL)
#   :443  HTTPS → proxies to councilchatbot:8080 inside Docker
#
# Certificate files expected at:
#   /etc/nginx/certs/cert.pem   (certificate / chain)
#   /etc/nginx/certs/key.pem    (private key)
#
# Generate a self-signed cert by running:
#   bash Infrastructure/generate-certs.sh
# on the EC2 host before starting the stack.
# ─────────────────────────────────────────────────────────────────────────────

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── HTTP → HTTPS redirect (ports 80 and 8080) ────────────────────────────
    # Both plain-HTTP entry points redirect to HTTPS on port 443.
    # Replace YOUR_EC2_IP with your actual EC2 public IP or domain name.
    # The destination is hardcoded so the :8080 port is never carried into
    # the final URL regardless of what the browser sent.
    # $request_uri preserves the path and query string.
    server {
        listen 80;
        listen 8080;
        server_name _;
        return 301 https://YOUR_EC2_IP$request_uri;
    }

    # ── HTTPS reverse proxy ───────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        # Certificates (mounted from Infrastructure/nginx/certs/ on the host)
        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Modern TLS only
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

        # Larger buffers for streaming / SSE responses
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;

        location / {
            proxy_pass         http://councilchatbot:8080;
            proxy_http_version 1.1;

            # Required for SignalR / SSE / WebSockets if ever added
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Standard proxy headers — ASP.NET Core uses these for
            # X-Forwarded-Proto so it knows the original request was HTTPS.
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Generous timeouts for LLM responses which can take 30-60 s
            proxy_read_timeout    300s;
            proxy_connect_timeout  75s;
            proxy_send_timeout    300s;
        }
    }
}
